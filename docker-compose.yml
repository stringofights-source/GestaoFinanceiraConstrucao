# ═══════════════════════════════════════════════════════════════
# ConstruManage — Docker Compose
# Orquestra: PostgreSQL + Django Backend + React Frontend (Nginx)
# ═══════════════════════════════════════════════════════════════

services:
  # ─── PostgreSQL Database ───
  db:
    image: postgres:16-alpine
    container_name: construmanage-db
    restart: unless-stopped
    env_file:
      - ./backend/.env.docker
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ─── Django REST Framework Backend ───
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: construmanage-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env.docker
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - static_files:/app/staticfiles

  # ─── React Frontend (Nginx) ───
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: construmanage-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
    driver: local
  static_files:
    driver: local
