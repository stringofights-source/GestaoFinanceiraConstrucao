# ConstruManage - Docker Compose
# Orquestra: PostgreSQL + Django Backend + React Frontend (Nginx)

services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: construmanage-db
    restart: unless-stopped
    env_file:
      - ./backend/.env.docker
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Django REST Framework Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: construmanage-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env.docker
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - static_files:/app/staticfiles
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health/', timeout=5).read()\""]
      interval: 10s
      timeout: 5s
      retries: 10

  # React Frontend (Nginx)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: construmanage-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
    driver: local
  static_files:
    driver: local
